<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strangers In Paradise - Cinematic Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        /* === PENGATURAN DASAR === */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* Dibuat sedikit lebih gelap agar efek debu lebih terlihat */
            font-family: 'Indie Flower', cursive;
            overflow-x: hidden;
            color: white;
            perspective: 1000px; 
            cursor: default;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            padding-top: 40px;
            text-align: center;
        }

        .yellow-board {
            position: absolute;
            top: 120px;
            left: 0;
            width: 100%;
            height: 850px;
            background-color: #dcb827;
            background-image: repeating-linear-gradient(
                rgba(0,0,0,0.04) 0px,
                rgba(0,0,0,0.04) 2px,
                transparent 2px,
                transparent 100px
            );
            z-index: -1;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 1.5s forwards;
            box-shadow: inset 0 30px 80px rgba(0,0,0,0.6); /* Vignet gelap di pinggir papan */
            transition: transform 0.1s ease-out; 
            overflow: hidden;
        }

        h1.title {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            letter-spacing: 2px;
            margin: 0;
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* === FITUR BARU: PARTIKEL DEBU === */
        #dust-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Agar tidak menghalangi klik */
            z-index: 100;
        }

        .dust-particle {
            position: absolute;
            background: rgba(255, 230, 150, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 230, 150, 0.3);
            animation: float-dust linear infinite;
        }

        @keyframes float-dust {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(100px); opacity: 0; }
        }

        /* === GAYA POLAROID === */
        .polaroid {
            background: #fdfdfd;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            display: inline-block;
            position: relative;
            opacity: 0; 
            transition: opacity 0.3s, box-shadow 0.3s, transform 0.2s ease-out;
            cursor: pointer;
            will-change: transform;
        }

        /* FITUR BARU: Filter Sepia pada Gambar */
        .polaroid img {
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
            filter: sepia(70%) contrast(1.1) brightness(0.9); /* Gambar terlihat tua/klasik */
            transition: filter 0.5s ease-in-out;
        }

        /* Efek Hover (Skala membesar & Warna kembali cerah) */
        .polaroid:hover {
            transform: scale(1.15) rotate(0deg) translate(0, 0) !important;
            z-index: 50;
            box-shadow: 0 25px 45px rgba(0,0,0,0.8);
        }
        
        .polaroid:hover img {
            filter: sepia(0%) contrast(1.05) brightness(1); /* Warna asli kembali */
        }

        .clothespin {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 32px;
            background: #b5804e; 
            border-radius: 2px;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.4);
            z-index: 10;
        }
        .clothespin::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #444;
        }

        .string-line {
            position: absolute;
            top: -40px;
            left: 50%;
            width: 1px;
            height: 40px;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .polaroid .caption {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* === ELEMEN SPESIFIK === */
        .main-photo { width: 250px; margin: 40px auto; animation: dropDownRotate 1s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards; z-index: 5; }
        .main-photo .caption { font-size: 1.5rem; }

        .menu-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; position: relative; }
        .hanging-wire { position: absolute; top: -5px; left: 10%; width: 80%; height: 2px; background-color: rgba(0, 0, 0, 0.4); box-shadow: 0 1px 1px rgba(255,255,255,0.1); z-index: 0; opacity: 0; animation: fadeIn 1s ease-in-out 2.5s forwards; }
        
        .menu-row .polaroid { width: 100px; padding: 5px 5px 25px 5px; z-index: 2; }
        .menu-row .polaroid .caption { font-size: 0.9rem; bottom: 2px; }

        .gallery-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; max-width: 850px; margin: 0 auto; position: relative; }
        .gallery-row .polaroid { width: 90px; padding: 5px 5px 20px 5px; }

        .timeline-text {
            position: absolute;
            top: 485px;
            width: 80%;
            left: 10%;
            display: flex;
            justify-content: space-around;
            color: rgba(0,0,0,0.3);
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 0;
            opacity: 0;
            animation: fadeIn 1s ease-in-out 3s forwards;
        }

        /* === ANIMASI JATUH === */
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes dropDownRotate { 0% { opacity: 0; transform: translateY(-250px) rotate(-15deg); } 70% { transform: translateY(10px) rotate(3deg); } 100% { opacity: 1; } }

        .menu-row .polaroid:nth-child(2) { animation: dropDownRotate 0.6s ease-out 3.0s forwards; }
        .menu-row .polaroid:nth-child(3) { animation: dropDownRotate 0.6s ease-out 3.2s forwards; }
        .menu-row .polaroid:nth-child(4) { animation: dropDownRotate 0.6s ease-out 3.4s forwards; }
        .menu-row .polaroid:nth-child(5) { animation: dropDownRotate 0.6s ease-out 3.6s forwards; }
        .menu-row .polaroid:nth-child(6) { animation: dropDownRotate 0.6s ease-out 3.8s forwards; }
        .menu-row .polaroid:nth-child(7) { animation: dropDownRotate 0.6s ease-out 4.0s forwards; }

        .gallery-row .polaroid:nth-child(1) { animation: dropDownRotate 0.5s ease-out 4.5s forwards; }
        .gallery-row .polaroid:nth-child(2) { animation: dropDownRotate 0.5s ease-out 4.6s forwards; }
        .gallery-row .polaroid:nth-child(3) { animation: dropDownRotate 0.5s ease-out 4.7s forwards; }
        .gallery-row .polaroid:nth-child(4) { animation: dropDownRotate 0.5s ease-out 4.8s forwards; }
        .gallery-row .polaroid:nth-child(5) { animation: dropDownRotate 0.5s ease-out 4.9s forwards; }
        .gallery-row .polaroid:nth-child(6) { animation: dropDownRotate 0.5s ease-out 5.0s forwards; }
        .gallery-row .polaroid:nth-child(7) { animation: dropDownRotate 0.5s ease-out 5.1s forwards; }

        /* === UI LIGHTBOX POPUP === */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lightbox.active { display: flex; opacity: 1; }
        
        .lightbox-content {
            background: #fdfdfd; padding: 15px 15px 50px 15px; box-shadow: 0 20px 50px rgba(0,0,0,1);
            transform: scale(0.7) rotate(-5deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; max-height: 85%; text-align: center;
        }
        .lightbox.active .lightbox-content { transform: scale(1) rotate(0deg); }
        
        .lightbox-content img { max-width: 100%; max-height: 65vh; display: block; border: 1px solid #ccc; }
        .lightbox-caption { color: #111; font-size: 2rem; margin-top: 15px; font-family: 'Caveat', cursive; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 3rem; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

    <div id="dust-container"></div>

    <div class="container">
        <div class="yellow-board" id="board"></div>
        <h1 class="title">Strangers In Paradise</h1>
        <div class="timeline-text">
            <span>'03</span><span>'04</span><span>'05</span><span>'06</span><span>'07</span>
        </div>

        <div class="main-photo polaroid" data-rot="2" style="transform: rotate(2deg);">
            <div class="clothespin"></div><div class="string-line"></div>
            <img src="https://picsum.photos/400/300?random=1" alt="Peek of The Week">
            <div class="caption">Peek of The Week</div>
        </div>

        <div class="menu-row">
            <div class="hanging-wire"></div>
            <div class="polaroid" data-rot="-4" style="transform: rotate(-4deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=2" alt="Projects"><div class="caption">Projects</div></div>
            <div class="polaroid" data-rot="3" style="transform: rotate(3deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=3" alt="Teachers"><div class="caption">Teachers</div></div>
            <div class="polaroid" data-rot="-1" style="transform: rotate(-1deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=4" alt="Students"><div class="caption">Students</div></div>
            <div class="polaroid" data-rot="5" style="transform: rotate(5deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=5" alt="New Photos"><div class="caption">New Photos</div></div>
            <div class="polaroid" data-rot="-2" style="transform: rotate(-2deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=6" alt="Blog"><div class="caption">Blog</div></div>
            <div class="polaroid" data-rot="2" style="transform: rotate(2deg);"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=7" alt="Contact"><div class="caption">Contact</div></div>
        </div>

        <div class="gallery-row">
            <div class="polaroid" data-rot="3" style="transform: rotate(3deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=8" alt="Gallery"></div>
            <div class="polaroid" data-rot="-3" style="transform: rotate(-3deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=9" alt="Gallery"></div>
            <div class="polaroid" data-rot="1" style="transform: rotate(1deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=10" alt="Gallery"></div>
            <div class="polaroid" data-rot="-5" style="transform: rotate(-5deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=11" alt="Gallery"></div>
            <div class="polaroid" data-rot="2" style="transform: rotate(2deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=12" alt="Gallery"></div>
            <div class="polaroid" data-rot="-2" style="transform: rotate(-2deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=13" alt="Gallery"></div>
            <div class="polaroid" data-rot="4" style="transform: rotate(4deg);"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=14" alt="Gallery"></div>
        </div>
    </div>

    <div id="lightboxModal" class="lightbox">
        <span class="close-btn">&times;</span>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="Popup Image">
            <div id="lightboxCaption" class="lightbox-caption"></div>
        </div>
    </div>

    <script>
        // --- 1. GENERATOR PARTIKEL DEBU ---
        const dustContainer = document.getElementById('dust-container');
        const particleCount = 40; // Jumlah partikel debu

        for (let i = 0; i < particleCount; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust-particle';
            
            // Ukuran acak (sangat kecil hingga sedikit lebih besar)
            let size = Math.random() * 3 + 1; 
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            
            // Posisi awal acak menyebar di seluruh layar
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.top = Math.random() * 100 + 'vh';
            
            // Kecepatan melayang dan delay acak agar natural
            dust.style.animationDuration = (Math.random() * 10 + 8) + 's';
            dust.style.animationDelay = (Math.random() * 5) + 's';
            
            dustContainer.appendChild(dust);
        }

        // --- 2. INTERAKSI UI & AUDIO ---
        const polaroids = document.querySelectorAll('.polaroid');
        const board = document.getElementById('board');
        const lightbox = document.getElementById('lightboxModal');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const shutterSound = new Audio('https://actions.google.com/sounds/v1/foley/camera_shutter.ogg');
        shutterSound.volume = 0.5;

        // Efek Parallax
        setTimeout(() => {
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 80;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
                board.style.transform = `translate(${xAxis * 0.5}px, ${yAxis * 0.5}px)`;

                polaroids.forEach((photo, index) => {
                    const speed = (index % 3) + 1.5; 
                    const rotOriginal = photo.getAttribute('data-rot') || 0;
                    photo.style.transform = `rotate(${rotOriginal}deg) translate(${xAxis * speed}px, ${yAxis * speed}px)`;
                });
            });
        }, 5500); 

        // Lightbox & Shutter Sound
        polaroids.forEach(photo => {
            photo.addEventListener('click', () => {
                const imgElement = photo.querySelector('img');
                if (!imgElement) return;

                shutterSound.currentTime = 0;
                shutterSound.play().catch(e => console.log("Audio diblokir oleh browser sampai user berinteraksi."));

                const src = imgElement.getAttribute('src');
                const caption = photo.querySelector('.caption') ? photo.querySelector('.caption').innerText : "Memories & Gallery";

                lightboxImg.setAttribute('src', src);
                lightboxCaption.innerText = caption;
                lightbox.classList.add('active');
            });
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target.id === 'lightboxModal' || e.target.classList.contains('close-btn')) {
                lightbox.classList.remove('active');
            }
        });
    </script>

</body>
</html>
