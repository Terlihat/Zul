<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strangers In Paradise - Final Perfection</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        /* === MESIN VARIABEL CSS (UNTUK PARALLAX ANTI-BUG) === */
        :root {
            --mouse-x: 0px;
            --mouse-y: 0px;
        }

        /* === PENGATURAN DASAR === */
        body {
            margin: 0;
            padding: 0;
            background-color: #111; 
            font-family: 'Indie Flower', cursive;
            overflow-x: hidden; /* Mencegah geser kanan-kiri (horizontal scroll) */
            color: white;
            perspective: 1000px; 
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            padding-top: 40px;
            text-align: center;
        }

        /* Papan Kuning (Dinamic Height) */
        .yellow-board {
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            min-height: 900px; /* Diubah ke min-height agar bisa memanjang di HP */
            background-color: #dcb827;
            background-image: repeating-linear-gradient(
                rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 2px,
                transparent 2px, transparent 100px
            );
            z-index: -1;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 1.5s forwards;
            box-shadow: inset 0 30px 80px rgba(0,0,0,0.6); 
            transform: translate(calc(var(--mouse-x) * 0.5), calc(var(--mouse-y) * 0.5));
            transition: transform 0.1s linear;
        }

        h1.title {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            letter-spacing: 2px;
            margin: 0;
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* === FITUR DEBU SINEMATIK === */
        #dust-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        .dust-particle {
            position: absolute;
            background: rgba(255, 230, 150, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 230, 150, 0.3);
            animation: float-dust linear infinite;
        }

        @keyframes float-dust {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-150px) translateX(100px); opacity: 0; }
        }

        /* === GAYA POLAROID (BUG FIX: TRANSFORM ENGINE) === */
        .polaroid {
            background: #fdfdfd;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            display: inline-block;
            position: relative;
            opacity: 0; 
            cursor: pointer;
            will-change: transform;
            /* Perbaikan Bug Transform: Menyatukan state akhir dengan CSS Variables */
            transform: translateY(-250px) rotate(-15deg); 
            transition: box-shadow 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Class ini ditambahkan oleh JS setelah animasi jatuh selesai */
        .polaroid.interactive {
            transform: translate(calc(var(--mouse-x) * var(--speed)), calc(var(--mouse-y) * var(--speed))) rotate(var(--rot));
            transition: transform 0.2s ease-out, box-shadow 0.3s;
        }

        .polaroid img {
            display: block; width: 100%; height: auto; border: 1px solid #ddd;
            filter: sepia(70%) contrast(1.1) brightness(0.9);
            transition: filter 0.5s ease-in-out;
        }

        /* Efek Hover Prioritas Tinggi */
        .polaroid.interactive:hover {
            transform: scale(1.15) rotate(0deg) translate(0, 0) !important;
            z-index: 50;
            box-shadow: 0 25px 45px rgba(0,0,0,0.8);
        }
        
        .polaroid.interactive:hover img {
            filter: sepia(0%) contrast(1.05) brightness(1); 
        }

        /* Jepitan & Tali */
        .clothespin {
            position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 32px; background: #b5804e; 
            border-radius: 2px; box-shadow: 1px 2px 4px rgba(0,0,0,0.4); z-index: 10;
        }
        .clothespin::after {
            content: ''; position: absolute; top: 12px; left: 0; width: 100%; height: 3px; background: #444;
        }
        .string-line {
            position: absolute; top: -40px; left: 50%; width: 1px; height: 40px;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        .polaroid .caption {
            position: absolute; bottom: 5px; left: 0; width: 100%;
            text-align: center; color: #333; font-weight: bold; font-size: 1.2rem;
        }

        /* === TATA LETAK GRID === */
        .main-photo { width: 250px; margin: 40px auto; z-index: 5; }
        .main-photo .caption { font-size: 1.5rem; }

        .menu-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; position: relative; }
        .hanging-wire { position: absolute; top: -5px; left: 10%; width: 80%; height: 2px; background-color: rgba(0, 0, 0, 0.4); box-shadow: 0 1px 1px rgba(255,255,255,0.1); z-index: 0; opacity: 0; animation: fadeIn 1s ease-in-out 2.5s forwards; }
        
        .menu-row .polaroid { width: 100px; padding: 5px 5px 25px 5px; z-index: 2; }
        .menu-row .polaroid .caption { font-size: 0.9rem; bottom: 2px; }

        .gallery-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; max-width: 850px; margin: 0 auto; position: relative; }
        .gallery-row .polaroid { width: 90px; padding: 5px 5px 20px 5px; }

        .timeline-text {
            position: absolute; bottom: 30px; width: 80%; left: 10%;
            display: flex; justify-content: space-around;
            color: rgba(0,0,0,0.3); font-size: 1.5rem; font-weight: bold;
            z-index: 0; opacity: 0; animation: fadeIn 1s ease-in-out 3s forwards;
        }

        /* === KEYFRAMES ANIMASI JATUH (BUG FIX TRANSFORM) === */
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes dropDownRotate { 
            0% { opacity: 0; transform: translateY(-250px) rotate(-15deg); } 
            70% { transform: translateY(10px) rotate(3deg); } 
            100% { opacity: 1; transform: translateY(0) rotate(var(--rot)); } 
        }

        /* Distribusi Waktu (Main) */
        .main-photo { animation: dropDownRotate 1s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards; }
        /* Menu Row */
        .menu-row .polaroid:nth-child(2) { animation: dropDownRotate 0.6s ease-out 3.0s forwards; }
        .menu-row .polaroid:nth-child(3) { animation: dropDownRotate 0.6s ease-out 3.2s forwards; }
        .menu-row .polaroid:nth-child(4) { animation: dropDownRotate 0.6s ease-out 3.4s forwards; }
        .menu-row .polaroid:nth-child(5) { animation: dropDownRotate 0.6s ease-out 3.6s forwards; }
        .menu-row .polaroid:nth-child(6) { animation: dropDownRotate 0.6s ease-out 3.8s forwards; }
        .menu-row .polaroid:nth-child(7) { animation: dropDownRotate 0.6s ease-out 4.0s forwards; }
        /* Gallery Row */
        .gallery-row .polaroid:nth-child(1) { animation: dropDownRotate 0.5s ease-out 4.5s forwards; }
        .gallery-row .polaroid:nth-child(2) { animation: dropDownRotate 0.5s ease-out 4.6s forwards; }
        .gallery-row .polaroid:nth-child(3) { animation: dropDownRotate 0.5s ease-out 4.7s forwards; }
        .gallery-row .polaroid:nth-child(4) { animation: dropDownRotate 0.5s ease-out 4.8s forwards; }
        .gallery-row .polaroid:nth-child(5) { animation: dropDownRotate 0.5s ease-out 4.9s forwards; }
        .gallery-row .polaroid:nth-child(6) { animation: dropDownRotate 0.5s ease-out 5.0s forwards; }
        .gallery-row .polaroid:nth-child(7) { animation: dropDownRotate 0.5s ease-out 5.1s forwards; }

        /* === FITUR BARU: RESPONSIVE DESIGN (MOBILE FIX) === */
        @media (max-width: 768px) {
            h1.title { font-size: 2.8rem; margin-bottom: 10px; }
            .yellow-board { min-height: 1200px; top: 120px; }
            .main-photo { width: 180px; margin: 20px auto; }
            .main-photo .caption { font-size: 1.2rem; }
            .menu-row { gap: 15px; margin-bottom: 30px; }
            .menu-row .polaroid { width: 85px; }
            .gallery-row .polaroid { width: 75px; }
            .hanging-wire { display: none; } /* Sembunyikan kawat di mobile agar tidak tumpang tindih */
            .timeline-text { font-size: 1.2rem; bottom: 10px; }
            .clothespin { transform: translateX(-50%) scale(0.8); top: -18px; }
        }

        /* === UI LIGHTBOX POPUP === */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .lightbox.active { display: flex; opacity: 1; }
        
        .lightbox-content {
            background: #fdfdfd; padding: 10px 10px 40px 10px; box-shadow: 0 20px 50px rgba(0,0,0,1);
            transform: scale(0.8) rotate(-5deg); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%; max-height: 80vh; text-align: center; position: relative;
        }
        .lightbox.active .lightbox-content { transform: scale(1) rotate(0deg); }
        
        .lightbox-content img { max-width: 100%; max-height: 65vh; display: block; border: 1px solid #ccc; object-fit: contain; }
        .lightbox-caption { color: #111; font-size: 2rem; margin-top: 10px; font-family: 'Caveat', cursive; }
        .close-btn { position: absolute; top: 15px; right: 25px; color: #aaa; font-size: 3rem; cursor: pointer; user-select: none; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <div id="dust-container"></div>

    <div class="container">
        <div class="yellow-board"></div>
        <h1 class="title">Strangers In Paradise</h1>

        <div class="main-photo polaroid" style="--rot: 2deg; --speed: 2;">
            <div class="clothespin"></div><div class="string-line"></div>
            <img src="https://picsum.photos/400/300?random=1" alt="Peek of The Week">
            <div class="caption">Peek of The Week</div>
        </div>

        <div class="menu-row">
            <div class="hanging-wire"></div>
            <div class="polaroid" style="--rot: -4deg; --speed: 1.5;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=2"><div class="caption">Projects</div></div>
            <div class="polaroid" style="--rot: 3deg; --speed: 2.2;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=3"><div class="caption">Teachers</div></div>
            <div class="polaroid" style="--rot: -1deg; --speed: 1.8;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=4"><div class="caption">Students</div></div>
            <div class="polaroid" style="--rot: 5deg; --speed: 2.5;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=5"><div class="caption">New Photos</div></div>
            <div class="polaroid" style="--rot: -2deg; --speed: 1.3;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=6"><div class="caption">Blog</div></div>
            <div class="polaroid" style="--rot: 2deg; --speed: 2.1;"><div class="clothespin"></div><img src="https://picsum.photos/200/200?random=7"><div class="caption">Contact</div></div>
        </div>

        <div class="gallery-row">
            <div class="polaroid" style="--rot: 3deg; --speed: 1.6;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=8"></div>
            <div class="polaroid" style="--rot: -3deg; --speed: 2.4;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=9"></div>
            <div class="polaroid" style="--rot: 1deg; --speed: 1.9;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=10"></div>
            <div class="polaroid" style="--rot: -5deg; --speed: 2.7;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=11"></div>
            <div class="polaroid" style="--rot: 2deg; --speed: 1.4;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=12"></div>
            <div class="polaroid" style="--rot: -2deg; --speed: 2.3;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=13"></div>
            <div class="polaroid" style="--rot: 4deg; --speed: 1.7;"><div class="clothespin"></div><div class="string-line"></div><img src="https://picsum.photos/180/180?random=14"></div>
        </div>

        <div class="timeline-text">
            <span>'03</span><span>'04</span><span>'05</span><span>'06</span><span>'07</span>
        </div>
    </div>

    <div id="lightboxModal" class="lightbox" role="dialog" aria-modal="true">
        <span class="close-btn" aria-label="Tutup">&times;</span>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="Popup Image">
            <div id="lightboxCaption" class="lightbox-caption"></div>
        </div>
    </div>

    <script>
        // 1. GENERATOR PARTIKEL DEBU (Ringan)
        const dustContainer = document.getElementById('dust-container');
        for (let i = 0; i < 30; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust-particle';
            let size = Math.random() * 3 + 1; 
            dust.style.width = size + 'px'; dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + 'vw'; dust.style.top = Math.random() * 100 + 'vh';
            dust.style.animationDuration = (Math.random() * 10 + 8) + 's';
            dust.style.animationDelay = (Math.random() * 5) + 's';
            dustContainer.appendChild(dust);
        }

        const polaroids = document.querySelectorAll('.polaroid');
        const root = document.documentElement;
        const lightbox = document.getElementById('lightboxModal');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const shutterSound = new Audio('https://actions.google.com/sounds/v1/foley/camera_shutter.ogg');
        shutterSound.volume = 0.5;

        // 2. PARALLAX CSS-VARIABLE ENGINE (Anti Bug & Jitter)
        // Menunggu animasi jatuh CSS selesai (5.5 detik), lalu mengaktifkan class interaktif
        setTimeout(() => {
            polaroids.forEach(p => p.classList.add('interactive'));
            
            // Mousemove murni hanya mengirim data koordinat ke CSS
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 80;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
                root.style.setProperty('--mouse-x', `${xAxis}px`);
                root.style.setProperty('--mouse-y', `${yAxis}px`);
            });
        }, 5500); 

        // 3. LIGHTBOX & AKSESIBILITAS (Bug Fix: Keyboard Esc ditambahkan)
        function closeLightbox() {
            lightbox.classList.remove('active');
        }

        polaroids.forEach(photo => {
            photo.addEventListener('click', () => {
                const imgElement = photo.querySelector('img');
                if (!imgElement) return;

                // Mainkan suara dengan aman
                shutterSound.currentTime = 0;
                shutterSound.play().catch(() => { /* Abaikan jika browser strict */ });

                const src = imgElement.getAttribute('src');
                const captionEl = photo.querySelector('.caption');
                const caption = captionEl ? captionEl.innerText : "Memories & Gallery";

                lightboxImg.setAttribute('src', src);
                lightboxCaption.innerText = caption;
                lightbox.classList.add('active');
            });
        });

        // Menutup via Klik Layar/Tombol
        lightbox.addEventListener('click', (e) => {
            if (e.target.id === 'lightboxModal' || e.target.classList.contains('close-btn')) {
                closeLightbox();
            }
        });

        // Menutup via Keyboard (Escape Key) - Praktik Aksesibilitas Web yang Baik
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && lightbox.classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>

</body>
</html>
