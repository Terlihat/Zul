<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strangers In Paradise</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Indie+Flower&display=swap" rel="stylesheet">
    
    <style>
        /* === PENGATURAN DASAR === */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Warna latar gelap seperti di awal video */
            font-family: 'Indie Flower', cursive;
            overflow-x: hidden;
            color: white;
        }

        /* Container utama */
        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            padding-top: 40px;
            text-align: center;
        }

        /* Latar belakang papan kuning yang muncul di video */
        .yellow-board {
            position: absolute;
            top: 120px;
            left: 0;
            width: 100%;
            height: 800px;
            background-color: #dcb827;
            background-image: repeating-linear-gradient(
                rgba(0,0,0,0.05) 0px,
                rgba(0,0,0,0.05) 2px,
                transparent 2px,
                transparent 100px
            ); /* Memberi sedikit tekstur kayu/garis */
            z-index: -1;
            opacity: 0;
            animation: fadeIn 1s ease-in-out 1.5s forwards;
        }

        /* === GAYA TEKS & JUDUL === */
        h1.title {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            letter-spacing: 2px;
            margin: 0;
            opacity: 0;
            /* Judul muncul pertama kali (fade in) */
            animation: fadeIn 2s ease-in-out forwards; 
        }

        /* === GAYA POLAROID === */
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: inline-block;
            position: relative;
            opacity: 0; /* Disembunyikan sebelum animasi dimulai */
        }

        .polaroid img {
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
        }

        .polaroid .caption {
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* === ELEMEN SPESIFIK === */
        /* Foto Utama (Peek of The Week) */
        .main-photo {
            width: 250px;
            margin: 30px auto;
            /* Animasi jatuh dari atas */
            animation: dropDownRotate 1s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
            transform: rotate(-3deg);
        }

        .main-photo .caption {
            font-size: 1.5rem;
        }

        /* Menu / Galeri Baris Pertama */
        .menu-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .menu-row .polaroid {
            width: 100px;
            padding: 5px 5px 25px 5px;
        }

        .menu-row .polaroid .caption {
            font-size: 0.9rem;
            bottom: 2px;
        }

        /* Galeri Baris Kedua */
        .gallery-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        .gallery-row .polaroid {
            width: 90px;
            padding: 5px 5px 20px 5px;
        }

        /* === ANIMASI (KEYFRAMES) === */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes dropDownRotate {
            0% { 
                opacity: 0; 
                transform: translateY(-200px) rotate(-15deg); 
            }
            100% { 
                opacity: 1; 
                /* Biarkan rotasi asli dipertahankan oleh elemennya */
            }
        }

        /* === PENGATURAN WAKTU JATUH (DELAY) === */
        /* Mengatur agar menu jatuh berurutan satu per satu setelah foto utama */
        .menu-row .polaroid:nth-child(1) { animation: dropDownRotate 0.6s ease-out 3.0s forwards; }
        .menu-row .polaroid:nth-child(2) { animation: dropDownRotate 0.6s ease-out 3.2s forwards; }
        .menu-row .polaroid:nth-child(3) { animation: dropDownRotate 0.6s ease-out 3.4s forwards; }
        .menu-row .polaroid:nth-child(4) { animation: dropDownRotate 0.6s ease-out 3.6s forwards; }
        .menu-row .polaroid:nth-child(5) { animation: dropDownRotate 0.6s ease-out 3.8s forwards; }
        .menu-row .polaroid:nth-child(6) { animation: dropDownRotate 0.6s ease-out 4.0s forwards; }

        /* Mengatur agar galeri bawah jatuh setelah menu selesai */
        .gallery-row .polaroid:nth-child(1) { animation: dropDownRotate 0.5s ease-out 4.5s forwards; }
        .gallery-row .polaroid:nth-child(2) { animation: dropDownRotate 0.5s ease-out 4.6s forwards; }
        .gallery-row .polaroid:nth-child(3) { animation: dropDownRotate 0.5s ease-out 4.7s forwards; }
        .gallery-row .polaroid:nth-child(4) { animation: dropDownRotate 0.5s ease-out 4.8s forwards; }
        .gallery-row .polaroid:nth-child(5) { animation: dropDownRotate 0.5s ease-out 4.9s forwards; }
        .gallery-row .polaroid:nth-child(6) { animation: dropDownRotate 0.5s ease-out 5.0s forwards; }
        .gallery-row .polaroid:nth-child(7) { animation: dropDownRotate 0.5s ease-out 5.1s forwards; }

    </style>
</head>
<body>

    <div class="container">
        <div class="yellow-board"></div>

        <h1 class="title">Strangers In Paradise</h1>

        <div class="main-photo polaroid" style="transform: rotate(2deg);">
            <img src="https://picsum.photos/300/250?random=1" alt="Peek of The Week">
            <div class="caption">Peek of The Week</div>
        </div>

        <div class="menu-row">
            <div class="polaroid" style="transform: rotate(-3deg);">
                <img src="https://picsum.photos/100/100?random=2" alt="Projects">
                <div class="caption">Projects</div>
            </div>
            <div class="polaroid" style="transform: rotate(2deg);">
                <img src="https://picsum.photos/100/100?random=3" alt="Teachers">
                <div class="caption">Teachers</div>
            </div>
            <div class="polaroid" style="transform: rotate(-1deg);">
                <img src="https://picsum.photos/100/100?random=4" alt="Students">
                <div class="caption">Students</div>
            </div>
            <div class="polaroid" style="transform: rotate(4deg);">
                <img src="https://picsum.photos/100/100?random=5" alt="New Photos">
                <div class="caption">New Photos</div>
            </div>
            <div class="polaroid" style="transform: rotate(-2deg);">
                <img src="https://picsum.photos/100/100?random=6" alt="Blog">
                <div class="caption">Blog</div>
            </div>
            <div class="polaroid" style="transform: rotate(1deg);">
                <img src="https://picsum.photos/100/100?random=7" alt="Contact">
                <div class="caption">Contact</div>
            </div>
        </div>

        <div class="gallery-row">
            <div class="polaroid" style="transform: rotate(3deg);"><img src="https://picsum.photos/90/90?random=8" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(-2deg);"><img src="https://picsum.photos/90/90?random=9" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(1deg);"><img src="https://picsum.photos/90/90?random=10" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(-4deg);"><img src="https://picsum.photos/90/90?random=11" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(2deg);"><img src="https://picsum.photos/90/90?random=12" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(-1deg);"><img src="https://picsum.photos/90/90?random=13" alt="Gallery"></div>
            <div class="polaroid" style="transform: rotate(3deg);"><img src="https://picsum.photos/90/90?random=14" alt="Gallery"></div>
        </div>

    </div>

</body>
</html>
